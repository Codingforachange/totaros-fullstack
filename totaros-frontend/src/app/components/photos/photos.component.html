<section id="photos" class="gallery-section section-padding">
  <div class="container">
    
    <div class="text-center">
      <p class="section-label">Life At The Window</p>
      <h2>Photo Gallery</h2>
      <div class="heading-accent"></div>
      <p class="section-lead">Fresh plates, smiles at the service window, and community block highlights.</p>
    </div>

    <!-- Async Loading Screen Spinner State -->
    <div *ngIf="isLoading" class="text-center current-loading">
      <p>Streaming truck gallery images...</p>
    </div>

    <!-- Main Grid Content Layer -->
    <div *ngIf="!isLoading" class="gallery-grid">
      
      <!-- Fallback display card if your PostgreSQL table contains zero image pointers -->
      <div *ngIf="galleryPhotos.length === 0" class="empty-gallery text-center">
        <p>No gallery images uploaded yet. Check back soon as we capture the season!</p>
      </div>

      <!-- Live Dynamic Database Image Loop Cards -->
      <div *ngFor="let item of galleryPhotos" class="gallery-card">
        <img [src]="item.image_url" [alt]="item.title || 'Totaro\'s Food Truck Photo'" class="gallery-img">
        <div class="gallery-overlay">
          <p class="gallery-caption">{{ item.title }}</p>
        </div>
      </div>
      
    </div>
  </div>
</section>
